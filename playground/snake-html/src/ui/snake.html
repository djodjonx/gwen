<div id="snake-root" class="snake-root">
  <div class="snake-wrap">
    <header class="snake-hud">
      <h1 class="snake-title">Snake</h1>
      <div class="snake-stats">
        <span id="snake-score">Score: 0</span>
        <span id="snake-best">Best: 0</span>
      </div>
    </header>

    <section id="snake-board" class="snake-board" aria-label="Snake board">
      <div id="snake-overlay" class="snake-overlay" aria-live="polite" hidden>
        <p id="snake-overlay-text">Game Over</p>
      </div>
    </section>

    <footer class="snake-help">
      Fleches / WASD pour jouer - <strong>R</strong> pour recommencer
    </footer>
  </div>
</div>
