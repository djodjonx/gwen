<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWEN — Space Shooter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #4fffb0;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      border: 1px solid #1a4a3a;
      image-rendering: pixelated;
    }
    #ui {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }
    #score { font-size: 20px; letter-spacing: 2px; text-shadow: 0 0 8px #4fffb0; }
    #lives { font-size: 14px; color: #ff6b6b; margin-top: 4px; }
  </style>
</head>
<body>
  <canvas id="game-canvas" width="480" height="640"></canvas>
  <div id="ui">
    <div id="score">SCORE: 0</div>
    <div id="lives">♥ ♥ ♥</div>
  </div>
  <script type="module" src="virtual:gwen/entry"></script>
</body>
</html>
