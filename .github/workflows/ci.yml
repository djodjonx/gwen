name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & Format ─────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          pnpm-version: '10'
      - run: pnpm lint
      - run: pnpm format:check
      - name: Test deprecation gate
        run: pnpm test:deprecations
      - name: Verify deprecation inventory
        run: pnpm check:deprecations

  # ── Rust + WASM ───────────────────────────────────────────────────────────
  rust:
    name: Rust tests + WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust tests — gwen-core
        run: cargo test -p gwen-core

      - name: WASM tests — gwen-core
        run: wasm-pack test --node crates/gwen-core

      - name: Build WASM — engine-core
        run: |
          wasm-pack build --target web --release \
            --out-dir $GITHUB_WORKSPACE/packages/@gwen/engine-core/wasm \
            crates/gwen-core

      # ── TypeScript : build → typecheck → test ────────────────────────────────
  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
        with:
          pnpm-version: '10'

      - name: Build packages
        run: pnpm build:ts

      - name: Typecheck
        run: pnpm typecheck

      - name: Test packages
        run: pnpm test:ts

  # ── CI Status ─────────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, rust, typescript]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.lint.result }}"       != "success" ] || \
             [ "${{ needs.rust.result }}"       != "success" ] || \
             [ "${{ needs.typescript.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All checks passed"
