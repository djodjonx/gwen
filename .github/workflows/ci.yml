name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Linting & Formatting ──────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Lint (oxlint)
        run: pnpm lint

      - name: Format check (oxfmt)
        run: pnpm format:check

  # ── Tests Rust + compilation WASM ─────────────────────────────────────────
  rust:
    name: Rust tests + WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/gwen-core"

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust tests (native)
        run: cargo test --manifest-path crates/gwen-core/Cargo.toml

      - name: WASM tests (wasm-pack)
        run: wasm-pack test --node crates/gwen-core

      - name: Build WASM release
        run: |
          wasm-pack build \
            --target web \
            --release \
            --out-dir packages/@gwen/engine-core/wasm \
            crates/gwen-core

      - name: Validate WASM build
        run: |
          if [ ! -d "packages/@gwen/engine-core/wasm" ]; then
            echo "❌ WASM output directory not found"
            exit 1
          fi
          if [ ! -f "packages/@gwen/engine-core/wasm/gwen_core.js" ]; then
            echo "❌ WASM JavaScript file not generated"
            exit 1
          fi
          if [ ! -f "packages/@gwen/engine-core/wasm/gwen_core_bg.wasm" ]; then
            echo "❌ WASM binary not generated"
            exit 1
          fi
          echo "✅ WASM build validated successfully"

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: packages/@gwen/engine-core/wasm/
          retention-days: 7

  # ── Tests TypeScript ───────────────────────────────────────────────────────
  typescript:
    name: TypeScript tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Test all packages
        run: pnpm test

  # ── Typecheck global ──────────────────────────────────────────────────────
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm
        with:
          pnpm-version: '10'

      - name: Typecheck all packages
        run: |
          pnpm --filter @gwen/engine-core exec tsc --noEmit
          pnpm --filter @gwen/cli exec tsc --noEmit
          pnpm --filter @gwen/vite-plugin exec tsc --noEmit
          pnpm --filter @gwen/plugin-audio exec tsc --noEmit
          pnpm --filter @gwen/plugin-debug exec tsc --noEmit
          pnpm --filter @gwen/plugin-input exec tsc --noEmit
          pnpm --filter @gwen/plugin-html-ui exec tsc --noEmit
          pnpm --filter @gwen/renderer-canvas2d exec tsc --noEmit
          pnpm --filter create-gwen-app exec tsc --noEmit

  # ── Build verification ────────────────────────────────────────────────────
  build:
    name: Build all packages
    runs-on: ubuntu-latest
    needs: [lint, typecheck, typescript, rust]
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node-pnpm
        with:
          pnpm-version: '10'

      - name: Download WASM artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: wasm-artifacts
          path: packages/@gwen/engine-core/wasm

      - name: Build all packages
        run: pnpm -r build

      - name: Verify build outputs
        run: |
          echo "✅ Verifying build outputs..."
          [ -d "packages/@gwen/engine-core/dist" ] && echo "✅ engine-core built" || echo "⚠️ engine-core dist not found"
          [ -d "packages/@gwen/cli/dist" ] && echo "✅ cli built" || echo "⚠️ cli dist not found"
          true

  # ── CI Status ──────────────────────────────────────────────────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, typescript, typecheck, rust, build]
    if: always()
    steps:
      - name: Check CI status
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typescript.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ CI failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
